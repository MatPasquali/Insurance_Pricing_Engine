name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências (mínimas para lint + testes)
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy pandas scikit-learn

      - name: Lint (ruff)
        run: ruff check .

      - name: Testes (pytest)
        run: pytest -q
